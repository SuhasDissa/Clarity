app-id: top.suhasdissa.Clarity
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: clarity
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  # Needed for converting URLs/YouTube videos and for audio speech transcription
  - --share=network
  # markitdown only trusts exiftool from well-known system paths; point it at
  # our bundled copy in /app/bin explicitly.
  - --env=EXIFTOOL_PATH=/app/bin/exiftool
build-options:
  env:
    - PIP_PREFIX=/app

modules:
  # Python dependencies for markitdown - using offline sources
  - pypi-dependencies.json

  # Perl interpreter (not in the runtime) - required to run exiftool
  - name: perl
    buildsystem: simple
    build-commands:
      - ./Configure -des -Dprefix=${FLATPAK_DEST} -Dusethreads -Duseshrplib
        -Dman1dir=none -Dman3dir=none
      - make -j$(nproc)
      - make install
      # Perl installs its extension .so files read-only; make them writable so
      # flatpak-builder's debuginfo stripping (eu-strip) can process them.
      - chmod -R u+w ${FLATPAK_DEST}/lib/perl5
    sources:
      - type: archive
        url: https://www.cpan.org/src/5.0/perl-5.42.2.tar.gz
        sha256: 9384e8deb75b7b1695e5637971b752281aaecd025a3d5d4734d33c1d0adfee47
    cleanup:
      - '/lib/perl5/*/pod'

  # exiftool - extracts EXIF/metadata from images and audio
  - name: exiftool
    buildsystem: simple
    build-commands:
      - ${FLATPAK_DEST}/bin/perl Makefile.PL
      - make install
    sources:
      - type: archive
        url: https://cpan.metacpan.org/authors/id/E/EX/EXIFTOOL/Image-ExifTool-13.55.tar.gz
        sha256: 5f4c81d34ad406538c2871ad72dbfceb5d9b412b2f16cbbeb4d712d270846667

  # Main application
  - name: clarity
    buildsystem: simple
    build-commands:
      - install -D main.py ${FLATPAK_DEST}/bin/clarity
      - chmod +x ${FLATPAK_DEST}/bin/clarity
      - cp -r src ${FLATPAK_DEST}/lib/python3.13/site-packages/
      - install -Dm644 data/top.suhasdissa.Clarity.desktop ${FLATPAK_DEST}/share/applications/top.suhasdissa.Clarity.desktop
      - install -Dm644 data/top.suhasdissa.Clarity.metainfo.xml ${FLATPAK_DEST}/share/metainfo/top.suhasdissa.Clarity.metainfo.xml
      - install -Dm644 data/icons/top.suhasdissa.Clarity.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/top.suhasdissa.Clarity.svg
    sources:
      - type: dir
        path: .
